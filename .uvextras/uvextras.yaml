scripts:
- name: allclean
  desc: runs clean and envclean; similar to distclean
  depends-on:
  - compose-clean
  use-python: false
  is-local: false

- name: clean
  is-local: false
  options:
    items_to_delete: build/ .coverage coverage.xml log/ .mypy_cache/ __pycache__/ .pytest_cache/ api/.pytest_cache/

- name: envclean
  is-local: false
  options:
    items_to_delete: node_modules/ ui/node_modules/ .venv/

- name: create
  desc: runs clean and envclean; similar to distclean
  depends-on:
  - ui-create
  is-local: false

- name: enable-dev
  is-local: false
  options:
    pkgs: autopep8 flake8 mypy pytest pytest-cov

- name: gitignore
  is-local: false
  options:
    features: node,python,react

- name: flake8
  desc: run flake8
  use-python: false
  cmd: uv run --frozen flake8 api/
  is-local: true

- name: mypy
  desc: run mypy
  use-python: false
  cmd: uv run --frozen mypy api/
  is-local: true

- name: pytest
  desc: run pytest
  use-python: false
  cmd: uv run --frozen pytest api/
  is-local: true

- name: api-manage
  desc: manage app cache
  use-python: false
  cmd: API_URL=http://localhost:3000/api/ uv run --frozen python -m api.manage
  is-local: true

- name: api-pboards
  desc: show puzzleboards
  use-python: false
  cmd: API_URL=http://localhost:3000/api/ ./etc/pboards.sh
  is-local: true

- name: api-refresh
  desc: manage app cache
  use-python: false
  cmd: API_URL=http://localhost:3000/api/ ./etc/refresh_puzzleboards.sh
  is-local: true

- name: api-start
  desc: start api outside container
  use-python: false
  cmd: APP_HOST=localhost APP_PORT=3000 uv run --frozen python -m api
  is-local: true

- name: ui-create
  desc: ui pnpm install
  use-python: false
  cmd: /bin/bash -c "cd ui && pnpm i"
  is-local: true

- name: ui-up
  desc: ui pnpm install
  use-python: false
  cmd: /bin/bash -c "cd ui && pnpm dev"
  is-local: true

- name: compose-build
  desc: build app
  use-python: false
  cmd: docker compose build --no-cache
  is-local: true

- name: compose-clean
  desc: bring app down
  use-python: false
  cmd: docker compose down --rmi local --volumes
  is-local: true

- name: compose-dn
  desc: bring app down
  use-python: false
  cmd: docker compose down
  is-local: true

- name: compose-up
  desc: bring app up
  use-python: false
  cmd: docker compose up
  is-local: true

- name: up
  desc: runs compose-build and compose-up
  depends-on:
  - create
  - compose-build
  - compose-up
  use-python: false
  is-local: true

- name: pboards
  desc: show puzzleboards
  use-python: false
  cmd: ./etc/pboards.sh
  is-local: true

- name: refresh
  desc: refresh puzzleboards
  use-python: false
  cmd: ./etc/refresh_puzzleboards.sh
  is-local: true
